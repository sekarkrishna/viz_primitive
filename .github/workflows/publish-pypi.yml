name: Publish to PyPI

on:
  push:
    tags:
      - 'justviz-v*'
      - 'dr2d-py-v*'

jobs:
  # ── dr2d-python: build multi-platform wheels via maturin ──────────
  build-dr2d-wheels:
    name: Build dr2d (${{ matrix.os }} / ${{ matrix.python }} / ${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/dr2d-py-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: '3.12'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: '3.13'
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python: '3.12'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python: '3.13'
          # macOS ARM (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            python: '3.12'
          - os: macos-latest
            target: aarch64-apple-darwin
            python: '3.13'
          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            python: '3.12'
          - os: macos-latest
            target: x86_64-apple-darwin
            python: '3.13'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target ${{ matrix.target }} --interpreter python${{ matrix.python }} --out dist
        working-directory: dr2d-python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}-py${{ matrix.python }}
          path: dr2d-python/dist/*.whl

  # ── dr2d-python: build sdist ──────────────────────────────────────
  build-dr2d-sdist:
    name: Build dr2d sdist
    if: startsWith(github.ref, 'refs/tags/dr2d-py-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist
        working-directory: dr2d-python

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dr2d-python/dist/*.tar.gz

  # ── dr2d-python: publish all wheels + sdist to PyPI ───────────────
  publish-dr2d-python:
    name: Publish dr2d to PyPI
    needs: [build-dr2d-wheels, build-dr2d-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List dist contents
        run: ls -la dist/

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        run: twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── justviz: pure Python, single wheel ────────────────────────────
  publish-justviz:
    name: justviz → PyPI
    if: startsWith(github.ref, 'refs/tags/justviz-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build
        working-directory: justviz

      - name: Publish
        run: uv publish
        working-directory: justviz
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
