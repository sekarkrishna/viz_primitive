name: Publish to PyPI

on:
  push:
    tags:
      - 'justviz-v*'
      - 'dr2d-py-v*'

jobs:
  publish-justviz:
    name: justviz → PyPI
    if: startsWith(github.ref, 'refs/tags/justviz-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build and publish
        run: uv publish
        working-directory: justviz
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  # Phase 1: dr2d Python binding via maturin
  # This job activates once dr2d-python/ is implemented
  publish-dr2d-python:
    name: dr2d-python → PyPI
    if: startsWith(github.ref, 'refs/tags/dr2d-py-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install maturin
        run: uv tool install maturin

      - name: Build and publish wheels
        run: maturin publish
        working-directory: dr2d-python
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
