name: Publish to PyPI

on:
  push:
    tags:
      - 'justviz-v*'
      - 'dr2d-py-v*'

jobs:
  # ── dr2d-python: build multi-platform wheels via maturin ──────────
  build-dr2d-wheels:
    name: Build dr2d wheel (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/dr2d-py-v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target ${{ matrix.target }} --out dist
        working-directory: dr2d-python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dr2d-python/dist/*.whl

  # ── dr2d-python: build sdist ──────────────────────────────────────
  build-dr2d-sdist:
    name: Build dr2d sdist
    if: startsWith(github.ref, 'refs/tags/dr2d-py-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist
        working-directory: dr2d-python

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dr2d-python/dist/*.tar.gz

  # ── dr2d-python: publish all wheels + sdist to PyPI ───────────────
  publish-dr2d-python:
    name: Publish dr2d to PyPI
    needs: [build-dr2d-wheels, build-dr2d-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/

  # ── justviz: pure Python, single wheel ────────────────────────────
  publish-justviz:
    name: justviz → PyPI
    if: startsWith(github.ref, 'refs/tags/justviz-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build
        working-directory: justviz

      - name: Publish
        run: uv publish
        working-directory: justviz
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
